<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>图片转透明 PNG</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f0f2f5;
    padding: 20px;
  }
  .container {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,.08);
    padding: 40px;
    width: 100%;
    max-width: 640px;
    text-align: center;
  }
  h1 { font-size: 24px; font-weight: 600; color: #1a1a2e; margin-bottom: 8px; }
  p.sub { color: #666; font-size: 14px; margin-bottom: 24px; }

  .drop-zone {
    border: 2px dashed #ccc;
    border-radius: 12px;
    padding: 48px 20px;
    cursor: pointer;
    transition: all .2s;
    background: #fafafa;
    position: relative;
  }
  .drop-zone:hover, .drop-zone.dragover {
    border-color: #4f6ef7;
    background: #f0f3ff;
  }
  .drop-zone .icon { font-size: 48px; color: #999; margin-bottom: 12px; }
  .drop-zone p { color: #888; font-size: 15px; }
  .drop-zone .hint { font-size: 12px; color: #aaa; margin-top: 8px; }
  .drop-zone input[type="file"] { display: none; }

  .preview-area { display: none; margin-top: 24px; }
  .preview-area.active { display: block; }
  .preview-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 16px;
    align-items: center;
    margin-bottom: 20px;
  }
  .preview-box {
    background: repeating-conic-gradient(#e0e0e0 0% 25%, transparent 25% 50%) 50% / 20px 20px;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid #ddd;
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    max-height: 240px;
  }
  .preview-box img {
    max-width: 100%;
    max-height: 100%;
    display: block;
  }
  .arrow { font-size: 24px; color: #999; user-select: none; }
  .file-name { font-size: 13px; color: #555; margin-bottom: 4px; }

  .btn {
    display: inline-block;
    padding: 12px 32px;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 500;
    border: none;
    cursor: pointer;
    transition: all .2s;
  }
  .btn-primary { background: #4f6ef7; color: #fff; }
  .btn-primary:hover { background: #3d5bd9; }
  .btn-primary:disabled { background: #a0b0f0; cursor: not-allowed; }
  .btn-success { background: #22c55e; color: #fff; }
  .btn-success:hover { background: #16a34a; }
  .btn-outline {
    background: transparent;
    color: #666;
    border: 1px solid #ccc;
    padding: 8px 20px;
    font-size: 13px;
  }
  .btn-outline:hover { border-color: #999; color: #333; }

  .status { margin-top: 16px; font-size: 14px; color: #666; min-height: 24px; }
  .status.error { color: #ef4444; }
  .status.processing { color: #4f6ef7; }
  .status.success { color: #22c55e; }

  .actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 8px; }

  /* ICO section */
  .ico-section {
    display: none;
    margin-top: 28px;
    padding-top: 24px;
    border-top: 1px solid #eee;
  }
  .ico-section.active { display: block; }
  .ico-section h3 { font-size: 18px; font-weight: 600; color: #1a1a2e; margin-bottom: 4px; }
  .ico-section .sub { font-size: 13px; color: #888; margin-bottom: 16px; }

  .size-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, 72px);
    gap: 8px;
    justify-content: center;
    margin-bottom: 12px;
  }
  .size-grid label {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 8px 4px;
    border: 2px solid #e5e7eb;
    border-radius: 8px;
    cursor: pointer;
    transition: all .15s;
    font-size: 12px;
    color: #555;
    user-select: none;
  }
  .size-grid label:hover { border-color: #a5b4fc; background: #f8f9ff; }
  .size-grid label.checked { border-color: #4f6ef7; background: #eff1ff; color: #4f6ef7; }
  .size-grid label input { display: none; }
  .size-grid .size-preview {
    width: 100%;
    aspect-ratio: 1;
    background: repeating-conic-gradient(#e0e0e0 0% 25%, transparent 25% 50%) 50% / 8px 8px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .size-grid .size-preview img { width: 100%; height: 100%; object-fit: contain; }

  .presets {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .btn-preset {
    padding: 4px 14px;
    border-radius: 20px;
    font-size: 12px;
    border: 1px solid #d1d5db;
    background: #fff;
    cursor: pointer;
    transition: all .15s;
    color: #555;
  }
  .btn-preset:hover { border-color: #4f6ef7; color: #4f6ef7; background: #f0f3ff; }

  .btn-ico { background: #f59e0b; color: #fff; }
  .btn-ico:hover { background: #d97706; }
  .btn-ico:disabled { background: #fcd34d; cursor: not-allowed; }

  @media (max-width: 500px) {
    .container { padding: 24px 16px; }
    .preview-row { grid-template-columns: 1fr; gap: 12px; }
    .arrow { transform: rotate(90deg); }
  }
</style>
</head>
<body>
<div class="container">
  <h1>图片转透明 PNG</h1>
  <p class="sub">上传图片，自动去除背景，生成透明背景的 PNG</p>

  <div class="drop-zone" id="dropZone">
    <div class="icon">📁</div>
    <p>拖拽图片到这里，或点击选择文件</p>
    <p class="hint">支持 JPG / PNG / WebP / BMP / TIFF / GIF ≤ 20MB</p>
    <input type="file" id="fileInput" accept="image/*">
  </div>

  <div class="preview-area" id="previewArea">
    <div class="preview-row">
      <div>
        <div class="file-name">原图</div>
        <div class="preview-box"><img id="originalPreview" alt="原图"></div>
      </div>
      <div class="arrow">→</div>
      <div>
        <div class="file-name">结果（透明背景）</div>
        <div class="preview-box"><img id="resultPreview" alt="结果" style="display:none"></div>
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-primary" id="convertBtn">✨ 去除背景</button>
      <button class="btn btn-success" id="downloadBtn" style="display:none">⬇ 下载 PNG</button>
      <button class="btn btn-outline" id="resetBtn">重新选择</button>
    </div>
    <div class="status" id="status"></div>
  </div>

  <div class="ico-section" id="icoSection">
    <h3>转换为 ICO 图标</h3>
    <p class="sub">选择要生成的图标尺寸（可多选）</p>

    <div class="size-grid" id="sizeGrid"></div>

    <div class="presets">
      <button class="btn-preset" data-sizes="32">仅 32×32</button>
      <button class="btn-preset" data-sizes="16,32,48">常用 (16+32+48)</button>
      <button class="btn-preset" data-sizes="16,32,48,64,128">高清 (16~128)</button>
      <button class="btn-preset" data-sizes="16,24,32,48,64,96,128,256">全尺寸</button>
    </div>

    <div class="actions">
      <button class="btn btn-ico" id="icoBtn">🎯 生成 ICO</button>
      <button class="btn btn-success" id="icoDownloadBtn" style="display:none">⬇ 下载 ICO</button>
    </div>
    <div class="status" id="icoStatus"></div>
  </div>
</div>

<script>
  // ── DOM refs ──
  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  const previewArea = document.getElementById('previewArea');
  const originalPreview = document.getElementById('originalPreview');
  const resultPreview = document.getElementById('resultPreview');
  const convertBtn = document.getElementById('convertBtn');
  const downloadBtn = document.getElementById('downloadBtn');
  const resetBtn = document.getElementById('resetBtn');
  const status = document.getElementById('status');

  const icoSection = document.getElementById('icoSection');
  const sizeGrid = document.getElementById('sizeGrid');
  const icoBtn = document.getElementById('icoBtn');
  const icoDownloadBtn = document.getElementById('icoDownloadBtn');
  const icoStatus = document.getElementById('icoStatus');

  // ── state ──
  let currentFile = null;
  let currentResultURL = null;
  let currentIcoBlob = null;

  // ── helper ──
  function setStatus(el, msg, type = '') {
    el.textContent = msg;
    el.className = 'status' + (type ? ' ' + type : '');
  }

  // ── size grid ──
  const ALL_SIZES = [16, 24, 32, 48, 64, 96, 128, 256];
  let selectedSizes = new Set([32]);

  function renderSizeGrid() {
    sizeGrid.innerHTML = '';
    for (const s of ALL_SIZES) {
      const label = document.createElement('label');
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.value = s;
      cb.checked = selectedSizes.has(s);
      cb.addEventListener('change', () => {
        if (cb.checked) selectedSizes.add(s); else selectedSizes.delete(s);
        label.classList.toggle('checked', cb.checked);
      });

      const preview = document.createElement('div');
      preview.className = 'size-preview';
      // show a placeholder square with the number
      const span = document.createElement('span');
      span.textContent = s;
      span.style.cssText = 'font-size:11px;color:#999;font-weight:600;';
      preview.appendChild(span);

      const text = document.createTextNode(s + '×' + s);
      label.appendChild(cb);
      label.appendChild(preview);
      label.appendChild(text);
      if (cb.checked) label.classList.add('checked');
      sizeGrid.appendChild(label);
    }
  }
  renderSizeGrid();

  // ── presets ──
  document.querySelectorAll('.btn-preset').forEach(btn => {
    btn.addEventListener('click', () => {
      const sizes = btn.dataset.sizes.split(',').map(Number);
      selectedSizes = new Set(sizes);
      // sync checkboxes
      document.querySelectorAll('#sizeGrid input[type=checkbox]').forEach(cb => {
        cb.checked = selectedSizes.has(Number(cb.value));
        cb.parentElement.classList.toggle('checked', cb.checked);
      });
      // hide old download
      icoDownloadBtn.style.display = 'none';
      currentIcoBlob = null;
      setStatus(icoStatus, '');
    });
  });

  // ── file handling ──
  function handleFile(file) {
    if (!file) return;
    if (!file.type.startsWith('image/')) {
      setStatus(status, '请选择图片文件', 'error');
      return;
    }
    if (file.size > 20 * 1024 * 1024) {
      setStatus(status, '文件过大（最大 20MB）', 'error');
      return;
    }
    currentFile = file;
    // Reset ICO state
    icoSection.classList.remove('active');
    icoDownloadBtn.style.display = 'none';
    currentIcoBlob = null;
    setStatus(icoStatus, '');

    const reader = new FileReader();
    reader.onload = (e) => {
      originalPreview.src = e.target.result;
      resultPreview.src = '';
      resultPreview.style.display = 'none';
      downloadBtn.style.display = 'none';
      previewArea.classList.add('active');
      setStatus(status, '');
      convertBtn.disabled = false;
      convertBtn.textContent = '✨ 去除背景';
    };
    reader.readAsDataURL(file);
  }

  dropZone.addEventListener('click', () => fileInput.click());

  dropZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropZone.classList.add('dragover');
  });
  dropZone.addEventListener('dragleave', () => {
    dropZone.classList.remove('dragover');
  });
  dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    handleFile(file);
  });
  fileInput.addEventListener('change', (e) => {
    handleFile(e.target.files[0]);
  });

  // ── remove background ──
  convertBtn.addEventListener('click', async () => {
    if (!currentFile) return;
    convertBtn.disabled = true;
    convertBtn.textContent = '⏳ 处理中...';
    setStatus(status, '正在去除背景，请稍候...', 'processing');

    const formData = new FormData();
    formData.append('file', currentFile);

    try {
      const resp = await fetch('/remove-bg', { method: 'POST', body: formData });
      if (!resp.ok) {
        const err = await resp.text();
        throw new Error(err || '处理失败');
      }
      const blob = await resp.blob();
      // revoke old
      if (currentResultURL) URL.revokeObjectURL(currentResultURL);
      currentResultURL = URL.createObjectURL(blob);
      resultPreview.src = currentResultURL;
      resultPreview.style.display = 'block';
      downloadBtn.style.display = 'inline-block';

      // Reset ICO state
      icoDownloadBtn.style.display = 'none';
      currentIcoBlob = null;
      setStatus(icoStatus, '');
      // Show ICO section
      icoSection.classList.add('active');

      setStatus(status, '✅ 背景去除完成！');
      convertBtn.textContent = '✨ 重新处理';
      convertBtn.disabled = false;
    } catch (err) {
      setStatus(status, '❌ ' + (err.message || '处理失败，请重试'), 'error');
      convertBtn.textContent = '✨ 去除背景';
      convertBtn.disabled = false;
    }
  });

  // ── download PNG ──
  downloadBtn.addEventListener('click', () => {
    if (!currentResultURL) return;
    const a = document.createElement('a');
    a.href = currentResultURL;
    a.download = currentFile.name.replace(/\.[^.]+$/, '_nobg.png');
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  });

  // ── convert to ICO ──
  icoBtn.addEventListener('click', async () => {
    const sizes = [...selectedSizes].sort((a, b) => a - b);
    if (sizes.length === 0) {
      setStatus(icoStatus, '请至少选择一个尺寸', 'error');
      return;
    }

    icoBtn.disabled = true;
    icoBtn.textContent = '⏳ 生成中...';
    setStatus(icoStatus, '正在生成 ICO 图标...', 'processing');
    icoDownloadBtn.style.display = 'none';
    currentIcoBlob = null;

    const formData = new FormData();
    formData.append('file', currentFile);
    formData.append('sizes', sizes.join(','));

    try {
      const resp = await fetch('/convert-to-ico', { method: 'POST', body: formData });
      if (!resp.ok) {
        const err = await resp.text();
        throw new Error(err || '生成失败');
      }
      currentIcoBlob = await resp.blob();
      icoDownloadBtn.style.display = 'inline-block';
      setStatus(icoStatus, '✅ ICO 图标生成完成！(' + sizes.join('×') + ')', 'success');
      icoBtn.textContent = '🎯 重新生成';
      icoBtn.disabled = false;
    } catch (err) {
      setStatus(icoStatus, '❌ ' + (err.message || '生成失败，请重试'), 'error');
      icoBtn.textContent = '🎯 生成 ICO';
      icoBtn.disabled = false;
    }
  });

  // ── download ICO ──
  icoDownloadBtn.addEventListener('click', () => {
    if (!currentIcoBlob) return;
    const url = URL.createObjectURL(currentIcoBlob);
    const a = document.createElement('a');
    a.href = url;
    a.download = currentFile.name.replace(/\.[^.]+$/, '.ico');
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 10000);
  });

  // ── reset ──
  resetBtn.addEventListener('click', () => {
    currentFile = null;
    if (currentResultURL) URL.revokeObjectURL(currentResultURL);
    currentResultURL = null;
    if (currentIcoBlob) { currentIcoBlob = null; }
    fileInput.value = '';
    originalPreview.src = '';
    resultPreview.src = '';
    previewArea.classList.remove('active');
    resultPreview.style.display = 'none';
    downloadBtn.style.display = 'none';
    icoSection.classList.remove('active');
    icoDownloadBtn.style.display = 'none';
    setStatus(status, '');
    setStatus(icoStatus, '');
    convertBtn.disabled = false;
    convertBtn.textContent = '✨ 去除背景';
  });
</script>
</body>
</html>
